# DP-Splat environment (brief §5 Phase 0.1)
#
# Two targets:
#   (1) H100 box (linux, CUDA 12) — the env this file primarily describes.
#   (2) Local macOS arm64 dev (CPU JAX): same pins minus CUDA; built 2026-07-06 with
#       python3 -m venv ~/.venvs/dp-splat  (Python 3.14.6)  — see REPRO.md.
#
# NOTE Python pin: 3.12, NOT 3.14 — hydra-core 1.3.4 crashes on Python 3.14's argparse
# (LazyCompletionHelp / "badly formed help string", hit locally 2026-07-06). Local dev on 3.14
# works because our scripts bypass hydra; the GPU box runs VBGS's hydra scripts as-is, so it
# must stay on <=3.13. VBGS's own README uses python 3.11.
#
# Version pins below = versions verified locally on 2026-07-06 (CPU). CUDA jax/jaxlib pins must
# be finalized on the H100 box at first setup (jax[cuda12] wheel availability), then frozen here.
name: dp-splat
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
      - jax[cuda12]==0.10.2      # local CPU verified 0.10.2; confirm cuda wheel on H100, then freeze
      - equinox==0.13.8
      - datasets==5.0.0
      - hydra-core==1.3.4
      - jaxtyping==0.3.11
      - matplotlib==3.11.0
      - multimethod==2.0.2
      - opencv-python==5.0.0.93
      - pillow==12.3.0
      - rich==15.0.0
      - tqdm==4.68.3
      - numpy==2.5.1
      - scipy==1.18.0
      - pot==0.9.6.post1  # T4/F6 Wasserstein artifact
      - pytest==8.*
      # 3D rendering env is SEPARATE per VBGS README (torch + INRIA diff-gaussian-rasterization,
      # conflicts with jax-cuda) — see third_party/vbgs/install_deps.sh
